<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add — Apartment Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
*{font-family:'Inter',-apple-system,sans-serif;}
body{background:#f4f7fa;margin-left:230px;padding:24px;}
@media(max-width:768px){body{margin-left:56px;}}
.form-section{background:white;border-radius:18px;padding:24px;margin-bottom:16px;box-shadow:0 2px 16px rgba(0,0,0,.05);max-width:500px;}
.form-section h5{font-weight:700;font-size:1rem;color:#1a2a3a;margin-bottom:18px;}
.form-control,.form-select{border-radius:10px;padding:11px 14px;border:2px solid #e8edf2;font-size:.88rem;}
.form-control:focus,.form-select:focus{border-color:#00838f;box-shadow:0 0 0 4px rgba(0,131,143,.1);}
.btn-primary{background:linear-gradient(135deg,#00695c,#00838f);border:none;border-radius:10px;padding:11px 18px;font-weight:600;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,105,92,.3);}
.alert{border-radius:14px;border:none;}
</style>
</head><body>
{% include 'marketing_sidebar.html' %}
<div class="container-fluid p-0" style="max-width:700px;">
  <h4 style="font-weight:700;color:#1a2a3a;margin-bottom:20px;"><i class="bi bi-plus-circle me-2" style="color:#00838f;"></i>Add Apartment</h4>
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% if msgs %}{% for cat,msg in msgs %}
    <div class="alert alert-{{ cat }} alert-dismissible fade show py-2" role="alert">
      <i class="bi bi-{{ 'check-circle-fill' if cat=='success' else 'exclamation-circle-fill' }} me-1"></i>{{ msg }}
      <button type="button" class="btn-close py-2" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}{% endif %}
  {% endwith %}
  <div class="form-section">
    <h5><i class="bi bi-plus-lg me-2" style="color:#00838f;"></i>Single Add</h5>
    <form method="post" action="/marketing/add">
      <div class="mb-2"><input type="text" name="apartment_name" class="form-control" placeholder="Apartment name" required></div>
      <div class="mb-2"><select name="hub_name" class="form-select" required>
        <option value="">— Select Hub —</option>{% for h in hub_names %}<option value="{{ h }}">{{ h }}</option>{% endfor %}
      </select></div>
      <div class="mb-2"><input type="url" name="location_link" class="form-control" placeholder="Google Maps link (optional)"></div>
      <button type="submit" class="btn btn-primary w-100"><i class="bi bi-plus-lg me-1"></i>Add</button>
    </form>
  </div>
  <div class="form-section">
    <h5><i class="bi bi-upload me-2" style="color:#00838f;"></i>Bulk Upload</h5>
    <div class="small text-muted mb-2">
      <i class="bi bi-info-circle me-1"></i>One per line: <code>Name, Hub, Map Link</code>
      <button class="btn btn-link btn-sm p-0 ms-1" style="font-size:.78rem;text-decoration:none;"
              onclick="document.getElementById('bulk_data').value='Prestige Sunrise Park, Arekere, https://maps.google.com\nSattva Misty Charm, Koramangala, https://maps.google.com'">
        <i class="bi bi-file-text me-1"></i>Sample
      </button>
    </div>
    <form method="post" action="/marketing/bulk-upload">
      <div class="mb-2"><textarea name="bulk_data" id="bulk_data" class="form-control" rows="5"
                placeholder="Prestige Sunrise Park, Arekere, https://maps.google.com/..."
                style="font-family:monospace;font-size:.82rem;"></textarea></div>
      <button type="submit" class="btn btn-primary w-100"><i class="bi bi-cloud-upload me-1"></i>Upload</button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
