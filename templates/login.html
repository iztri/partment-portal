<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apartment Portal — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { font-family: 'Inter', -apple-system, sans-serif; }
    body {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background: linear-gradient(135deg, #004d40 0%, #00695c 30%, #00838f 60%, #1565c0 100%);
      padding:20px; position:relative; overflow:hidden;
    }
    body::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse at 20% 80%, rgba(0,229,255,.12) 0%, transparent 60%),
                 radial-gradient(ellipse at 80% 20%, rgba(0,200,83,.08) 0%, transparent 60%);
    }
    .login-card {
      background:rgba(255,255,255,.97);
      backdrop-filter:blur(20px);
      border-radius:28px;
      padding:44px 40px;
      width:100%; max-width:400px;
      box-shadow:0 30px 80px rgba(0,0,0,.35);
      animation:slideUp .6s cubic-bezier(.16,1,.3,1);
      position:relative; z-index:1;
      border:1px solid rgba(255,255,255,.08);
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(40px) scale(.95); }
      to { opacity:1; transform:translateY(0) scale(1); }
    }
    .logo-icon {
      width:64px; height:64px;
      background:linear-gradient(135deg,#00695c,#00acc1);
      border-radius:18px;
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 20px;
      font-size:30px; color:white;
      box-shadow:0 12px 32px rgba(0,105,92,.35);
      transition:transform .3s;
    }
    .logo-icon:hover { transform:rotate(-5deg) scale(1.05); }
    h3 { font-weight:800; font-size:1.6rem; color:#1a1a2e; letter-spacing:-.8px; }
    .subtitle { color:#888; font-size:.9rem; margin-bottom:28px; }
    .form-control {
      border-radius:12px; padding:14px 16px 14px 44px;
      border:2px solid #eef0f4;
      font-size:.95rem; font-weight:500;
      transition:all .25s; background:#fafbfc;
    }
    .form-control:focus {
      border-color:#00838f;
      box-shadow:0 0 0 5px rgba(0,131,143,.12);
      background:white;
    }
    .form-label { font-weight:600; font-size:.82rem; color:#444; margin-bottom:6px; }
    .btn-login {
      background:linear-gradient(135deg,#00695c,#00838f,#1565c0);
      background-size:200% 200%;
      border:none; border-radius:12px; padding:16px;
      font-weight:700; font-size:1rem;
      transition:all .35s; position:relative; overflow:hidden;
      animation:gradientShift 4s ease infinite;
    }
    @keyframes gradientShift {
      0%,100% { background-position:0% 50%; }
      50% { background-position:100% 50%; }
    }
    .btn-login:hover { transform:translateY(-3px); box-shadow:0 12px 35px rgba(0,105,92,.4); }
    .btn-login:active { transform:translateY(0); }
    .input-icon-wrap { position:relative; }
    .input-icon-wrap .bi {
      position:absolute; left:16px; top:50%; transform:translateY(-50%);
      color:#b0bec5; font-size:1.15rem; transition:color .25s;
    }
    .input-icon-wrap:focus-within .bi { color:#00838f; }
    .credentials-hint {
      background:linear-gradient(135deg,#f5faf9,#f0f7fa);
      border-radius:14px; padding:14px 18px; margin-top:24px;
      font-size:.78rem; color:#666;
      border:1px solid rgba(0,131,143,.08);
    }
    .credentials-hint code {
      background:white; padding:2px 8px; border-radius:6px;
      color:#00695c; font-weight:600; font-size:.78rem;
      border:1px solid #e0f2f1;
    }
    .alert { border-radius:12px; font-size:.85rem; border:none; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .fade-in { animation:fadeIn .35s ease-out; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-icon"><i class="bi bi-building"></i></div>
    <h3 class="text-center">Apartment Portal</h3>
    <p class="text-center subtitle">Sign in to continue</p>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% if msgs %}
        {% for cat, msg in msgs %}
          <div class="alert alert-{{ cat }} alert-dismissible fade show py-2 fade-in" role="alert">
            <i class="bi bi-{{ 'check-circle-fill' if cat=='success' else 'exclamation-circle-fill' }} me-1"></i>
            {{ msg }}
            <button type="button" class="btn-close py-2" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-icon-wrap">
          <i class="bi bi-person"></i>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-login w-100 text-white">
        <i class="bi bi-arrow-right-circle me-2"></i>Sign In
      </button>
    </form>

    <div class="credentials-hint">
      <div class="fw-semibold mb-1" style="color:#444;">Demo Access</div>
      Marketing: <code>rohit</code> / <code>rohit@123</code>, <code>marketing1</code> / <code>mark@123</code><br>
      Field: <code>field1</code>–<code>field5</code> / <code>field@123</code>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
