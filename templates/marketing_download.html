<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download — Apartment Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
*{font-family:'Inter',-apple-system,sans-serif;}
body{background:#f4f7fa;margin-left:230px;padding:24px;}
@media(max-width:768px){body{margin-left:56px;}}
.form-section{background:white;border-radius:18px;padding:24px;box-shadow:0 2px 16px rgba(0,0,0,.05);max-width:450px;}
.form-section h5{font-weight:700;font-size:1rem;color:#1a2a3a;margin-bottom:18px;}
.form-control,.form-select{border-radius:10px;padding:11px 14px;border:2px solid #e8edf2;font-size:.88rem;}
.form-control:focus,.form-select:focus{border-color:#00838f;box-shadow:0 0 0 4px rgba(0,131,143,.1);}
.btn-primary{background:linear-gradient(135deg,#00695c,#00838f);border:none;border-radius:10px;padding:14px 18px;font-weight:600;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,105,92,.3);}
.alert{border-radius:14px;border:none;}
</style>
</head><body>
{% include 'marketing_sidebar.html' %}
<div class="container-fluid p-0" style="max-width:600px;">
  <h4 style="font-weight:700;color:#1a2a3a;margin-bottom:20px;"><i class="bi bi-download me-2" style="color:#00838f;"></i>Download Data</h4>
  <div class="form-section">
    <h5><i class="bi bi-funnel me-2" style="color:#00838f;"></i>Filters</h5>
    <form method="get" action="/marketing/download" target="_blank">
      <div class="mb-3">
        <label class="form-label small fw-semibold">Start Date (Created At)</label>
        <input type="date" name="start_date" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">End Date (Created At)</label>
        <input type="date" name="end_date" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Status</label>
        <select name="status" class="form-select">
          <option value="">— All Statuses —</option>
          <option value="Pending">Pending</option>
          <option value="Visited">Visited</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-file-earmark-excel me-1"></i>Download Excel
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
